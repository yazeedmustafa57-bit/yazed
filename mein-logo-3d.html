<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Mein 3D Logo ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #050508;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }
        .overlay h1 {
            font-size: clamp(1.8rem, 5vw, 4rem);
            font-weight: 200;
            letter-spacing: 0.4em;
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700, #ffec8b, #ffd700, #ffaa00, #ffd700);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 3s ease-in-out infinite;
            filter: drop-shadow(0 0 60px rgba(255,215,0,0.4));
            margin-top: 30vh;
            transform: scale(1);
        }
        @keyframes gradShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 0% 100%; }
            75% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .overlay .sub {
            font-size: clamp(0.5rem, 1vw, 0.8rem);
            color: rgba(255,215,0,0.2);
            margin-top: 0.3rem;
            letter-spacing: 0.8em;
            font-weight: 300;
        }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050508;
            z-index: 100;
            color: #ffd700;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            transition: opacity 0.8s ease;
            gap: 1rem;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading .spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,215,0,0.1);
            border-top: 2px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <span>✦ LADE ... ✦</span>
</div>
<div class="overlay">
    <h1>✦ MEIN LOGO ✦</h1>
    <p class="sub">3D</p>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 400);
camera.position.set(0, 0.5, 7);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.2, 0.05);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ===== LIGHTS =====
const ambient = new THREE.AmbientLight(0x222244, 0.2);
scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffd700, 4);
keyLight.position.set(4, 8, 5);
keyLight.castShadow = true;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffaa00, 2);
fillLight.position.set(-4, 3, 4);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0x4488ff, 1.5);
rimLight.position.set(0, -3, -6);
scene.add(rimLight);
const topLight = new THREE.DirectionalLight(0xffffff, 3);
topLight.position.set(0, 10, 0);
scene.add(topLight);
const backLight = new THREE.DirectionalLight(0xff6600, 1);
backLight.position.set(-3, -1, -5);
scene.add(backLight);

// ===== NEBEL (Fog) =====
scene.fog = new THREE.FogExp2(0x050508, 0.0025);

// ===== MAIN GROUP =====
const mainGroup = new THREE.Group();
scene.add(mainGroup);

// ===== REALISTISCHER BODEN-RING =====
function createRings() {
    const group = new THREE.Group();
    const ringCount = 5;

    for (let j = 0; j < ringCount; j++) {
        const radius = 1.5 + j * 0.2;
        const geo = new THREE.TorusGeometry(radius, 0.01 + Math.random() * 0.02, 24, 80);
        const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0.1 - j * 0.02, 0.9, 0.4 + j * 0.1),
            emissive: new THREE.Color().setHSL(0.1 - j * 0.02, 0.8, 0.15),
            emissiveIntensity: 0.5,
            metalness: 0.9,
            roughness: 0.1,
            transparent: true,
            opacity: 0.25 - j * 0.03
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.1;
        mesh.rotation.z = (Math.random() - 0.5) * 0.1;
        mesh.position.y = -0.6 - j * 0.15;
        mesh.userData = { rotX: mesh.rotation.x, rotZ: mesh.rotation.z, speed: 0.005 + Math.random() * 0.01 };
        group.add(mesh);
    }
    return group;
}
const rings = createRings();
mainGroup.add(rings);

// ===== 3D BUCHSTABE "M" – Detailliert =====
function createLetterM() {
    const group = new THREE.Group();

    // Gold-Material
    const goldMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xffa500,
        emissiveIntensity: 0.15,
        metalness: 0.95,
        roughness: 0.08,
    });
    const goldMatDark = new THREE.MeshStandardMaterial({
        color: 0xcc8800,
        emissive: 0x885500,
        emissiveIntensity: 0.08,
        metalness: 0.9,
        roughness: 0.2,
    });
    const goldMatLight = new THREE.MeshStandardMaterial({
        color: 0xffdd44,
        emissive: 0xffcc00,
        emissiveIntensity: 0.25,
        metalness: 0.98,
        roughness: 0.05,
    });

    const w = 0.07;
    const h = 1.2;
    const d = 0.15;
    const sp = 0.4;

    // Hauptbeine
    const l1 = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), goldMat);
    l1.position.set(-sp, 0, 0);
    l1.castShadow = true;
    group.add(l1);

    const l2 = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), goldMat);
    l2.position.set(sp, 0, 0);
    l2.castShadow = true;
    group.add(l2);

    // Schräge Streben
    const diagLen = Math.sqrt(Math.pow(sp, 2) + Math.pow(h * 0.45, 2));
    const diagAngle = Math.atan2(h * 0.45, sp);

    const d1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, d), goldMatLight);
    d1.position.set(-sp/2, h * 0.2, 0);
    d1.rotation.z = -diagAngle;
    d1.scale.y = diagLen / 0.06;
    d1.castShadow = true;
    group.add(d1);

    const d2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, d), goldMatLight);
    d2.position.set(sp/2, h * 0.2, 0);
    d2.rotation.z = diagAngle;
    d2.scale.y = diagLen / 0.06;
    d2.castShadow = true;
    group.add(d2);

    // Mittelsteg
    const mid = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.3, 0.18), goldMatDark);
    mid.position.set(0, -h * 0.2, 0);
    mid.castShadow = true;
    group.add(mid);

    // Obere Verbindung
    const top = new THREE.Mesh(new THREE.BoxGeometry(sp * 2 + w, 0.05, d), goldMatLight);
    top.position.set(0, h/2 - 0.01, 0);
    top.castShadow = true;
    group.add(top);

    // Abgerundete Enden (kleine Kugeln an den Ecken)
    const cornerMat = new THREE.MeshStandardMaterial({
        color: 0xffdd00,
        emissive: 0xffaa00,
        emissiveIntensity: 0.3,
        metalness: 0.98,
        roughness: 0.05,
    });
    for (let side of [-1, 1]) {
        const c = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), cornerMat);
        c.position.set(side * sp, h/2, 0);
        group.add(c);
        const c2 = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), cornerMat);
        c2.position.set(side * sp, -h/2, 0);
        group.add(c2);
    }

    return group;
}
const letterM = createLetterM();
letterM.position.y = 0.15;
mainGroup.add(letterM);

// ===== KRONE – Detailliert =====
function createCrown() {
    const group = new THREE.Group();
    const goldC = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xffa500,
        emissiveIntensity: 0.3,
        metalness: 0.95,
        roughness: 0.08,
    });
    const goldL = new THREE.MeshStandardMaterial({
        color: 0xffee66,
        emissive: 0xffcc00,
        emissiveIntensity: 0.5,
        metalness: 0.98,
        roughness: 0.05,
    });

    // Basisring
    const base = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.035, 12, 28), goldC);
    base.rotation.x = Math.PI / 2;
    base.position.y = 0.76;
    group.add(base);

    // Zweiter Ring
    const base2 = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.02, 8, 20), goldL);
    base2.rotation.x = Math.PI / 2 + 0.2;
    base2.position.y = 0.80;
    group.add(base2);

    // 5 Zacken
    const spikeCount = 5;
    for (let i = 0; i < spikeCount; i++) {
        const angle = (i / spikeCount) * Math.PI * 2;
        const spike = new THREE.Mesh(
            new THREE.ConeGeometry(0.03, 0.25, 6),
            goldL
        );
        spike.position.set(Math.cos(angle) * 0.22, 0.80, Math.sin(angle) * 0.22);
        spike.rotation.x = Math.sin(angle) * 0.4;
        spike.rotation.z = -Math.cos(angle) * 0.4;
        spike.castShadow = true;
        group.add(spike);

        // Kleine Kugel auf jedem Zacken
        const tip = new THREE.Mesh(
            new THREE.SphereGeometry(0.015, 6, 6),
            new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0xffd700,
                emissiveIntensity: 0.8,
                metalness: 0.95,
                roughness: 0.05,
            })
        );
        tip.position.set(
            Math.cos(angle) * 0.22 + Math.cos(angle) * 0.25,
            0.80 + 0.25,
            Math.sin(angle) * 0.22 + Math.sin(angle) * 0.25
        );
        group.add(tip);
    }

    // Zentrale Spitze
    const center = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.35, 8), goldL);
    center.position.set(0, 0.80, 0);
    center.castShadow = true;
    group.add(center);

    // Großer Stern oben
    const starGeo = new THREE.OctahedronGeometry(0.06);
    const starMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffd700,
        emissiveIntensity: 1.0,
        metalness: 0.95,
        roughness: 0.05,
    });
    const star = new THREE.Mesh(starGeo, starMat);
    star.position.set(0, 0.80 + 0.35, 0);
    star.scale.set(1, 1.5, 1);
    star.userData = { spin: true };
    group.add(star);

    return group;
}
const crown = createCrown();
mainGroup.add(crown);

// ===== ORBITING GOLD-KUGELN =====
const orbGroup = new THREE.Group();
mainGroup.add(orbGroup);
const orbs = [];
const orbCount = 20;
for (let i = 0; i < orbCount; i++) {
    const size = 0.015 + Math.random() * 0.04;
    const hue = 0.08 + Math.random() * 0.04;
    const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(hue, 0.9, 0.5 + Math.random() * 0.3),
        emissive: new THREE.Color().setHSL(hue, 0.8, 0.2),
        emissiveIntensity: 0.6,
        metalness: 0.9,
        roughness: 0.1,
        transparent: true,
        opacity: 0.4 + Math.random() * 0.5
    });
    const orb = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), mat);
    const radius = 0.8 + Math.random() * 1.5;
    const angle = Math.random() * Math.PI * 2;
    const height = (Math.random() - 0.5) * 1.2;
    orb.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
    const speed = 0.15 + Math.random() * 0.35;
    const hSpeed = 0.1 + Math.random() * 0.3;
    const phase = Math.random() * Math.PI * 2;
    orb.userData = { radius, angle, height, speed, hSpeed, phase, startOpacity: mat.opacity };
    orbGroup.add(orb);
    orbs.push(orb);
}

// ===== ECHTE STERNE – tausende! =====
function createStars() {
    const starField = new THREE.Group();

    // Große helle Sterne (einzelne Meshes mit Glow)
    const brightStarMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffd700,
        emissiveIntensity: 0.5,
        transparent: true,
        opacity: 0.6,
    });
    for (let i = 0; i < 100; i++) {
        const r = 8 + Math.random() * 60;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const star = new THREE.Mesh(
            new THREE.SphereGeometry(0.02 + Math.random() * 0.08, 4, 4),
            brightStarMat.clone()
        );
        star.position.set(
            Math.sin(phi) * Math.cos(theta) * r,
            Math.sin(phi) * Math.sin(theta) * r,
            Math.cos(phi) * r
        );
        star.material.opacity = 0.2 + Math.random() * 0.6;
        star.userData = {
            twinkleSpeed: 0.2 + Math.random() * 1.0,
            twinklePhase: Math.random() * Math.PI * 2,
            baseOpacity: star.material.opacity
        };
        starField.add(star);
    }

    // Kleine Points-Sterne (tausende)
    const particleCount = 6000;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);
    for (let i = 0; i < particleCount; i++) {
        const r = 5 + Math.random() * 80;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i*3] = Math.sin(phi) * Math.cos(theta) * r;
        positions[i*3+1] = Math.sin(phi) * Math.sin(theta) * r;
        positions[i*3+2] = Math.cos(phi) * r;

        // Farben: weiß, hellblau, gold
        const colorType = Math.random();
        if (colorType < 0.5) {
            colors[i*3] = 1; colors[i*3+1] = 1; colors[i*3+2] = 1;
        } else if (colorType < 0.75) {
            colors[i*3] = 1; colors[i*3+1] = 0.95; colors[i*3+2] = 0.7;
        } else {
            colors[i*3] = 0.7; colors[i*3+1] = 0.8; colors[i*3+2] = 1;
        }
        sizes[i] = 0.01 + Math.random() * 0.06;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    const starMat2 = new THREE.PointsMaterial({
        size: 0.04,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
        depthWrite: false,
    });
    const starPoints = new THREE.Points(starGeo, starMat2);
    starField.add(starPoints);

    // Milchstraße (Nebel-Effekt)
    const nebulaCount = 2000;
    const nPos = new Float32Array(nebulaCount * 3);
    const nCol = new Float32Array(nebulaCount * 3);
    for (let i = 0; i < nebulaCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 20 + Math.random() * 40;
        const spread = (Math.random() - 0.5) * 10;
        nPos[i*3] = Math.cos(angle) * radius + (Math.random() - 0.5) * 5;
        nPos[i*3+1] = Math.sin(angle) * radius * 0.3 + (Math.random() - 0.5) * 3;
        nPos[i*3+2] = spread;
        const ni = Math.random();
        nCol[i*3] = 0.3 + ni * 0.2;
        nCol[i*3+1] = 0.2 + ni * 0.15;
        nCol[i*3+2] = 0.4 + ni * 0.3;
    }
    const nGeo = new THREE.BufferGeometry();
    nGeo.setAttribute('position', new THREE.BufferAttribute(nPos, 3));
    nGeo.setAttribute('color', new THREE.BufferAttribute(nCol, 3));
    const nMat = new THREE.PointsMaterial({
        size: 0.3,
        vertexColors: true,
        transparent: true,
        opacity: 0.06,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
        depthWrite: false,
    });
    const nebula = new THREE.Points(nGeo, nMat);
    starField.add(nebula);

    return starField;
}
const starField = createStars();
scene.add(starField);

// ===== GOLDENE FUNKEN / LICHTSTRAHLEN =====
const sparkGroup = new THREE.Group();
mainGroup.add(sparkGroup);
for (let i = 0; i < 60; i++) {
    const points = [];
    const segs = 2 + Math.floor(Math.random() * 5);
    for (let j = 0; j < segs; j++) {
        points.push(new THREE.Vector3(
            (Math.random() - 0.5) * 4,
            (Math.random() - 0.5) * 4,
            (Math.random() - 0.5) * 4
        ));
    }
    const curve = new THREE.CatmullRomCurve3(points);
    const g = new THREE.BufferGeometry().setFromPoints(curve.getPoints(10));
    const m = new THREE.LineBasicMaterial({
        color: 0xffd700,
        transparent: true,
        opacity: 0.01 + Math.random() * 0.04,
        blending: THREE.AdditiveBlending
    });
    const line = new THREE.Line(g, m);
    const r = 3 + Math.random() * 6;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    line.position.set(Math.sin(p)*Math.cos(t)*r, Math.sin(p)*Math.sin(t)*r, Math.cos(p)*r);
    line.userData = { rotSpeed: 0.001 + Math.random() * 0.005 };
    sparkGroup.add(line);
}

// ===== MOUSE / TOUCH =====
let mx = 0, my = 0, tx = 0, ty = 0;
let targetZoom = 7;
let currentZoom = 7;
document.addEventListener('mousemove', e => {
    mx = (e.clientX / innerWidth) * 2 - 1;
    my = -(e.clientY / innerHeight) * 2 + 1;
});
document.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
        mx = (e.touches[0].clientX / innerWidth) * 2 - 1;
        my = -(e.touches[0].clientY / innerHeight) * 2 + 1;
    }
}, { passive: true });
document.addEventListener('touchmove', e => {
    if (e.touches.length === 1) {
        mx = (e.touches[0].clientX / innerWidth) * 2 - 1;
        my = -(e.touches[0].clientY / innerHeight) * 2 + 1;
    }
}, { passive: true });
document.addEventListener('wheel', e => {
    targetZoom = Math.max(3, Math.min(12, targetZoom + e.deltaY * 0.005));
}, { passive: true });

window.addEventListener('resize', () => {
    const w = innerWidth, h = innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
});

// ===== LOADING =====
setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
}, 1000);

// ===== ANIMATION =====
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    tx += (mx - tx) * 0.025;
    ty += (my - ty) * 0.025;
    currentZoom += (targetZoom - currentZoom) * 0.05;

    // Hauptgruppe
    mainGroup.rotation.y = t * 0.03 + tx * 0.6;
    mainGroup.rotation.x = Math.sin(t * 0.025) * 0.025 + ty * 0.35;
    mainGroup.rotation.z = Math.sin(t * 0.018) * 0.012;

    // Ringe
    rings.children.forEach((ring, i) => {
        ring.rotation.x = ring.userData.rotX + Math.sin(t * 0.03 + i) * 0.02;
        ring.rotation.z += ring.userData.speed;
    });

    // M Pulsieren
    const pulse = 1 + Math.sin(t * 0.4) * 0.006;
    letterM.scale.set(pulse, pulse, pulse);

    // Krone schweben + drehen
    crown.position.y = Math.sin(t * 0.3) * 0.03;
    crown.children.forEach(child => {
        if (child.userData?.spin) {
            child.rotation.y = t * 2;
            child.rotation.x = t * 1.5;
        }
    });

    // Orbits
    orbs.forEach(orb => {
        const d = orb.userData;
        const angle = d.angle + t * d.speed * 0.15;
        const h = d.height + Math.sin(t * d.hSpeed + d.phase) * 0.25;
        orb.position.x = Math.cos(angle) * d.radius;
        orb.position.z = Math.sin(angle) * d.radius;
        orb.position.y = h;
        orb.material.opacity = d.startOpacity + Math.sin(t * 0.4 + d.phase) * 0.2;
    });

    // Helle Sterne funkeln
    starField.children.forEach(child => {
        if (child.isMesh && child.userData.twinkleSpeed) {
            const d = child.userData;
            child.material.opacity = d.baseOpacity + Math.sin(t * d.twinkleSpeed + d.twinklePhase) * 0.3;
        }
    });

    // Sternfeld langsam rotieren
    starField.rotation.y = t * 0.003;
    starField.rotation.x = Math.sin(t * 0.001) * 0.02;

    // Funken
    sparkGroup.children.forEach(line => {
        line.rotation.y += line.userData.rotSpeed || 0.002;
    });
    sparkGroup.rotation.y = t * 0.005;

    // Kamera
    camera.position.x = Math.sin(t * 0.003) * 0.15 + tx * 0.3;
    camera.position.y = 0.5 + Math.sin(t * 0.005) * 0.06 + ty * 0.15;
    camera.position.z = currentZoom;
    camera.lookAt(0, 0, 0);

    // Bloom
    bloom.strength = 1.0 + Math.sin(t * 0.08) * 0.3;

    composer.render();
}
animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Cyber 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            overflow-x: hidden;
            overflow-y: auto;
            background: #020208;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            touch-action: manipulation;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; pointer-events: none; }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }
        .overlay .tag {
            font-size: 0.7rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
            margin-bottom: 0.8rem;
            animation: fadeUp 1.2s ease-out 0.3s both;
        }
        .overlay h1 {
            font-size: clamp(2.8rem, 8vw, 7rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ff00cc, #00ffff, #ff00cc);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 4s ease-in-out infinite, fadeUp 1s ease-out 0.5s both;
        }
        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .overlay p {
            font-size: clamp(0.8rem, 1.2vw, 1.1rem);
            color: rgba(255,255,255,0.35);
            margin-top: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            animation: fadeUp 1s ease-out 0.7s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Scrollable content */
        .scroll-content {
            position: relative;
            z-index: 5;
            margin-top: 100vh;
            padding: 4rem 2rem 6rem;
            background: rgba(2,2,8,0.92);
            backdrop-filter: blur(20px);
            min-height: 60vh;
        }
        .scroll-inner {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 700px) {
            .scroll-inner { grid-template-columns: 1fr; }
        }
        .scroll-card {
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,0,204,0.15);
            background: rgba(255,0,204,0.03);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .scroll-card:hover {
            border-color: rgba(0,255,255,0.3);
            transform: translateY(-4px);
        }
        .scroll-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #ff00cc, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .scroll-card p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
        }
        .scroll-card a {
            color: #00ffff;
            text-decoration: none;
        }
        .scroll-card a:hover { color: #ff00cc; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="tag">✦ Cyberpunk 3D</div>
    <h1>NEON VOID</h1>
    <p>Bewege deinen Finger · Erlebe die Zukunft</p>
</div>

<section class="scroll-content">
    <div class="scroll-inner">
        <div class="scroll-card">
            <h3>Über das Projekt</h3>
            <p>Eine immersive 3D-Experience mit Three.js und UnrealBloomPass — inspiriert von futuristischem Cyberpunk-Design.</p>
        </div>
        <div class="scroll-card">
            <h3>Technologie</h3>
            <p>Three.js • WebGL • UnrealBloomPass • ES Modules</p>
        </div>
        <div class="scroll-card">
            <h3>GitHub</h3>
            <p><a href="https://github.com/yazeedmustafa57-bit" target="_blank">@yazeedmustafa57-bit</a></p>
        </div>
    </div>
</section>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.prepend(renderer.domElement);

// ===== POST =====
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.3, 0.05);
composer.addPass(bloom);

// ===== LIGHTS =====
scene.add(new THREE.AmbientLight(0x222244, 0.3));
const l1 = new THREE.PointLight(0xff00cc, 120, 30); l1.position.set(5, 4, 6); scene.add(l1);
const l2 = new THREE.PointLight(0x00ffff, 100, 30); l2.position.set(-5, -3, 6); scene.add(l2);
const l3 = new THREE.PointLight(0xff6600, 60, 20); l3.position.set(0, 7, -5); scene.add(l3);

// ===== MAIN GROUP =====
const group = new THREE.Group();
scene.add(group);

// Core sphere (glowing center)
const coreGeo = new THREE.SphereGeometry(1.0, 48, 48);
const coreMat = new THREE.MeshPhysicalMaterial({
    color: 0xaa00ff,
    emissive: 0x6600cc,
    emissiveIntensity: 1.5,
    metalness: 0.0,
    roughness: 0.1,
    transparent: true,
    opacity: 0.7,
});
const core = new THREE.Mesh(coreGeo, coreMat);
group.add(core);

// Inner wireframe sphere
const inetGeo = new THREE.IcosahedronGeometry(1.4, 1);
const inetMat = new THREE.MeshPhysicalMaterial({
    color: 0xff00cc,
    wireframe: true,
    emissive: 0xff00cc,
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.4,
});
const inet = new THREE.Mesh(inetGeo, inetMat);
group.add(inet);

// Outer wireframe
const outGeo = new THREE.IcosahedronGeometry(1.8, 1);
const outMat = new THREE.MeshPhysicalMaterial({
    color: 0x00ffff,
    wireframe: true,
    emissive: 0x00ffff,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.2,
});
const outMesh = new THREE.Mesh(outGeo, outMat);
group.add(outMesh);

// ===== FLOATING RINGS =====
function makeRing(radius, color, opacity, rotX, rotY, emI) {
    const g = new THREE.TorusGeometry(radius, 0.02, 20, 80);
    const m = new THREE.MeshPhysicalMaterial({
        color, emissive: color, emissiveIntensity: emI||0.5,
        transparent: true, opacity, blending: THREE.AdditiveBlending,
    });
    const mesh = new THREE.Mesh(g, m);
    mesh.rotation.x = rotX; mesh.rotation.y = rotY;
    return mesh;
}
const r1 = makeRing(2.2, 0xff00cc, 0.6, Math.PI/2, 0.3, 0.8);
const r2 = makeRing(2.6, 0x00ffff, 0.4, 1.2, 0.7, 0.6);
const r3 = makeRing(3.0, 0xff6600, 0.25, 0.5, 1.4, 0.4);
group.add(r1, r2, r3);

// ===== ORBITING DOTS =====
const dotCount = 300;
const dotGeo = new THREE.BufferGeometry();
const dotPos = new Float32Array(dotCount * 3);
const dotSiz = new Float32Array(dotCount);
const dotCol = new Float32Array(dotCount * 3);
const dotData = [];

for (let i = 0; i < dotCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 3.2 + Math.random() * 2.0;
    dotPos[i*3] = Math.sin(phi)*Math.cos(theta)*r;
    dotPos[i*3+1] = Math.sin(phi)*Math.sin(theta)*r;
    dotPos[i*3+2] = Math.cos(phi)*r;
    dotSiz[i] = 0.02 + Math.random() * 0.05;
    const c = new THREE.Color().setHSL(0.75 + Math.random()*0.25, 1, 0.6);
    dotCol[i*3] = c.r; dotCol[i*3+1] = c.g; dotCol[i*3+2] = c.b;
    dotData.push({ theta, phi, r, speed: 0.05 + Math.random()*0.15, off: Math.random()*Math.PI*2 });
}
dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
dotGeo.setAttribute('size', new THREE.BufferAttribute(dotSiz, 1));
dotGeo.setAttribute('color', new THREE.BufferAttribute(dotCol, 3));
const dotMat = new THREE.PointsMaterial({
    size: 0.05, vertexColors: true, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, sizeAttenuation: true,
});
const dotP = new THREE.Points(dotGeo, dotMat);
group.add(dotP);

// ===== BACKGROUND STARS =====
const starCount = 6000;
const sPos = new Float32Array(starCount * 3);
const sSiz = new Float32Array(starCount);
const sVel = [];
for (let i = 0; i < starCount; i++) {
    const r = 20 + Math.random() * 30;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2*Math.random() - 1);
    sPos[i*3] = Math.sin(phi)*Math.cos(theta)*r;
    sPos[i*3+1] = Math.sin(phi)*Math.sin(theta)*r;
    sPos[i*3+2] = Math.cos(phi)*r;
    sSiz[i] = 0.3 + Math.random() * 1.5;
    sVel.push({ x: (Math.random()-0.5)*0.002, y: (Math.random()-0.5)*0.002, z: (Math.random()-0.5)*0.002 });
}
const sg = new THREE.BufferGeometry();
sg.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
sg.setAttribute('size', new THREE.BufferAttribute(sSiz, 1));
const sm = new THREE.PointsMaterial({
    color: 0x8888ff, size: 0.03, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, sizeAttenuation: true,
});
const stars = new THREE.Points(sg, sm);
scene.add(stars);

// ===== LIGHTNING STREAKS =====
const streakGroup = new THREE.Group();
scene.add(streakGroup);
const streakLines = [];
for (let i = 0; i < 30; i++) {
    const pts = [];
    const len = 3 + Math.random() * 6;
    for (let j = 0; j < len; j++) {
        pts.push(new THREE.Vector3(
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 2
        ));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const curvePts = curve.getPoints(20);
    const g = new THREE.BufferGeometry().setFromPoints(curvePts);
    const m = new THREE.LineBasicMaterial({
        color: new THREE.Color().setHSL(0.75 + Math.random()*0.25, 1, 0.5),
        transparent: true, opacity: 0.1 + Math.random() * 0.2,
    });
    const line = new THREE.Line(g, m);
    const r = 4 + Math.random() * 4;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2*Math.random() - 1);
    line.position.set(
        Math.sin(phi)*Math.cos(theta)*r,
        Math.sin(phi)*Math.sin(theta)*r,
        Math.cos(phi)*r
    );
    line.scale.setScalar(0.5 + Math.random() * 1.5);
    streakGroup.add(line);
    streakLines.push(line);
}

// ===== MOUSE =====
let mx = 0, my = 0;
let tx = 0, ty = 0;
document.addEventListener('mousemove', (e) => {
    mx = (e.clientX / window.innerWidth) * 2 - 1;
    my = -(e.clientY / window.innerHeight) * 2 + 1;
});
let touchStartX = 0, touchStartY = 0, touchActive = false;
document.addEventListener('touchstart', (e) => {
    touchActive = true;
    if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }
}, { passive: true });
document.addEventListener('touchmove', (e) => {
    if (!touchActive || e.touches.length !== 1) return;
    const dx = Math.abs(e.touches[0].clientX - touchStartX);
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    if (dx > dy && dx > 10) {
        mx = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
        my = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    }
}, { passive: true });
document.addEventListener('touchend', () => {
    touchActive = false; mx = 0; my = 0;
}, { passive: true });

// ===== RESIZE =====
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h); composer.setSize(w, h);
});

// ===== ANIMATION =====
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    tx += (mx - tx) * 0.05;
    ty += (my - ty) * 0.05;

    group.rotation.x = ty * 0.35 + Math.sin(t * 0.07) * 0.06;
    group.rotation.y = tx * 0.45 + t * 0.1;
    group.rotation.z = Math.sin(t * 0.03) * 0.03;

    const p = 1 + Math.sin(t * 0.8) * 0.02;
    core.scale.set(p, p, p);

    inet.rotation.x = t * 0.015;
    inet.rotation.y = t * 0.025;
    outMesh.rotation.x = -t * 0.01;
    outMesh.rotation.y = -t * 0.02;

    r1.rotation.z = t * 0.12 + 0.2;
    r2.rotation.x = t * 0.1 + 1.2;
    r2.rotation.y = t * 0.08 + 0.7;
    r3.rotation.z = -t * 0.06;

    // Orbit dots
    const dp = dotP.geometry.attributes.position.array;
    for (let i = 0; i < dotCount; i++) {
        const d = dotData[i];
        const th = d.theta + t * d.speed * 0.08;
        const ph = d.phi + Math.sin(t * d.speed * 0.04 + d.off) * 0.02;
        dp[i*3] = Math.sin(ph)*Math.cos(th)*d.r;
        dp[i*3+1] = Math.sin(ph)*Math.sin(th)*d.r;
        dp[i*3+2] = Math.cos(ph)*d.r;
    }
    dotP.geometry.attributes.position.needsUpdate = true;

    // Stars drift
    const sp = stars.geometry.attributes.position.array;
    for (let i = 0; i < starCount; i++) {
        sp[i*3] += sVel[i].x;
        sp[i*3+1] += sVel[i].y;
        sp[i*3+2] += sVel[i].z;
        const r = Math.sqrt(sp[i*3]**2 + sp[i*3+1]**2 + sp[i*3+2]**2);
        if (r > 55) {
            const nr = 20 + Math.random()*8;
            const t2 = Math.random()*Math.PI*2;
            const p2 = Math.acos(2*Math.random()-1);
            sp[i*3] = Math.sin(p2)*Math.cos(t2)*nr;
            sp[i*3+1] = Math.sin(p2)*Math.sin(t2)*nr;
            sp[i*3+2] = Math.cos(p2)*nr;
        }
    }
    stars.geometry.attributes.position.needsUpdate = true;

    // Streaks
    streakGroup.rotation.y = t * 0.02;
    streakGroup.rotation.x = Math.sin(t * 0.01) * 0.1;

    // Camera
    camera.position.x = Math.sin(t * 0.012) * 1.0 + tx * 1.0;
    camera.position.y = 1 + Math.sin(t * 0.018) * 0.3 + ty * 0.7;
    camera.lookAt(0, 0, 0);

    composer.render();
}
animate();
</script>
</body>
</html>

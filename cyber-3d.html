<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>CYBER://NEON</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            overflow-x: hidden;
            overflow-y: auto;
            background: #020208;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            touch-action: manipulation;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; pointer-events: none; }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }
        .overlay .tag {
            font-size: 0.65rem;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            color: rgba(255,0,204,0.5);
            margin-bottom: 0.5rem;
            animation: fadeUp 1.2s ease-out 0.3s both;
            text-shadow: 0 0 20px rgba(255,0,204,0.3);
        }
        .overlay h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ff00cc, #00ffff, #ff00cc, #ffff00, #ff00cc);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 3s ease-in-out infinite, fadeUp 1s ease-out 0.5s both;
            filter: drop-shadow(0 0 40px rgba(255,0,204,0.3));
        }
        @keyframes gradShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .overlay .sub-glow {
            font-size: clamp(0.75rem, 1.1vw, 1rem);
            color: rgba(0,255,255,0.4);
            margin-top: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            animation: fadeUp 1s ease-out 0.7s both;
            text-shadow: 0 0 30px rgba(0,255,255,0.2);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* -- Glitch overlay -- */
        .glitch-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
            mix-blend-mode: overlay;
            opacity: 0.08;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,0,204,0.03) 2px, rgba(255,0,204,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,255,255,0.02) 3px, rgba(0,255,255,0.02) 6px);
        }
        .glitch-flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 14;
            opacity: 0;
            background: linear-gradient(135deg, rgba(255,0,204,0.15), rgba(0,255,255,0.15));
            animation: flashRand 8s ease-in-out infinite;
        }
        @keyframes flashRand {
            0%, 92%, 100% { opacity: 0; }
            93% { opacity: 0.6; }
            94% { opacity: 0; }
            95% { opacity: 0.3; }
            96% { opacity: 0; }
        }

        /* -- Scroll Content -- */
        .scroll-content {
            position: relative;
            z-index: 5;
            margin-top: 100vh;
            padding: 5rem 2rem 6rem;
            background: rgba(2,2,8,0.95);
            backdrop-filter: blur(24px);
            min-height: 50vh;
            border-top: 1px solid rgba(255,0,204,0.1);
        }
        .scroll-inner {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 700px) {
            .scroll-inner { grid-template-columns: 1fr; }
        }
        .scroll-card {
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,0,204,0.12);
            background: rgba(255,0,204,0.03);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .scroll-card:hover {
            border-color: rgba(0,255,255,0.3);
            transform: translateY(-4px);
            box-shadow: 0 0 40px rgba(0,255,255,0.05);
        }
        .scroll-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #ff00cc, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .scroll-card p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.6;
        }
        .scroll-card a {
            color: #00ffff;
            text-decoration: none;
        }
        .scroll-card a:hover { color: #ff00cc; }
    </style>
</head>
<body>

<div class="glitch-overlay"></div>
<div class="glitch-flash"></div>

<div class="overlay">
    <div class="tag">✦ CYBERPUNK ✦ NEON 3D</div>
    <h1>/// NEON<br>VOID</h1>
    <p class="sub-glow">BERÜHRE · BEWEGE · ERLEBE</p>
</div>

<section class="scroll-content">
    <div class="scroll-inner">
        <div class="scroll-card">
            <h3>✦ Über das Projekt</h3>
            <p>Cyberpunk 3D Visual — inspiriert von futuristischem Neon-Design. Drei.js, WebGL & Bloom.</p>
        </div>
        <div class="scroll-card">
            <h3>✦ Technologie</h3>
            <p>Three.js • UnrealBloomPass • WebGL • ES Modules • ImportMap</p>
        </div>
        <div class="scroll-card">
            <h3>✦ GitHub</h3>
            <p><a href="https://github.com/yazeedmustafa57-bit" target="_blank">@yazeedmustafa57-bit</a></p>
        </div>
    </div>
</section>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const composer = new EffectComposer(renderer);
const rp = new RenderPass(scene, camera);
composer.addPass(rp);
const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.6, 0.2, 0.1
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ===== LIGHTS =====
const al = new THREE.AmbientLight(0x222244, 0.5);
scene.add(al);
const dl1 = new THREE.DirectionalLight(0xff00cc, 2);
dl1.position.set(5, 5, 5);
scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0x00ffff, 2);
dl2.position.set(-5, -3, 5);
scene.add(dl2);
const dl3 = new THREE.DirectionalLight(0xffff00, 0.8);
dl3.position.set(0, -5, -5);
scene.add(dl3);

// ===== MAIN GROUP =====
const group = new THREE.Group();
scene.add(group);

// ===== HUMAN SILHOUETTE (particle figure) =====
const figGroup = new THREE.Group();
group.add(figGroup);

// Generate human-like form
const bodyPts = [];
const densities = {
    head: 200, torso: 400, arms: 300, legs: 300
};

// Head
for (let i = 0; i < densities.head; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 0.3 + Math.random() * 0.05;
    const x = Math.sin(phi) * Math.cos(theta) * r;
    const y = Math.cos(phi) * r + 1.65;
    const z = Math.sin(phi) * Math.sin(theta) * r;
    bodyPts.push(x, y, z);
}

// Torso
for (let i = 0; i < densities.torso; i++) {
    const y = Math.random() * 1.0 + 0.6;
    const rad = 0.25 + (1 - (y - 0.6)) * 0.2;
    const theta = Math.random() * Math.PI * 2;
    const r = rad * Math.sqrt(Math.random());
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    bodyPts.push(x, y, z);
}

// Arms
for (let i = 0; i < densities.arms; i++) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const t = Math.random();
    const y = 1.4 - t * 0.8;
    const rad = 0.08 + t * 0.06;
    const theta = Math.random() * Math.PI * 2;
    const r = rad * Math.sqrt(Math.random());
    const cx = side * (0.5 + t * 0.2);
    const x = cx + Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    bodyPts.push(x, y, z);
}

// Legs
for (let i = 0; i < densities.legs; i++) {
    const side = Math.random() > 0.5 ? 0.15 : -0.15;
    const t = Math.random();
    const y = 0.6 - t * 0.7;
    const rad = 0.1 + t * 0.04;
    const theta = Math.random() * Math.PI * 2;
    const r = rad * Math.sqrt(Math.random());
    const x = side + Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    bodyPts.push(x, y, z);
}

const figGeo = new THREE.BufferGeometry();
figGeo.setAttribute('position', new THREE.Float32BufferAttribute(bodyPts, 3));

const figMat = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.035,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true,
});
const figure = new THREE.Points(figGeo, figMat);
figGroup.add(figure);

// Wireframe body outline - simplified
const bodyLines = [];
const outlineData = [
    // Head
    { pts: Array.from({length: 24}, (_, i) => {
        const a = (i/24)*Math.PI*2;
        return new THREE.Vector3(Math.cos(a)*0.32, Math.sin(a)*0.32+1.65, 0);
    }), color: 0xff00cc },
    // Shoulders
    { pts: [
        new THREE.Vector3(-0.6, 1.4, 0), new THREE.Vector3(0, 1.45, 0),
        new THREE.Vector3(0.6, 1.4, 0)
    ], color: 0x00ffff },
    // Spine
    { pts: [
        new THREE.Vector3(0, 1.5, 0), new THREE.Vector3(0, 0.6, 0)
    ], color: 0xff00cc },
];
outlineData.forEach(od => {
    const g = new THREE.BufferGeometry().setFromPoints(od.pts);
    const m = new THREE.LineBasicMaterial({
        color: od.color,
        transparent: true,
        opacity: 0.4,
    });
    const line = new THREE.Line(g, m);
    figGroup.add(line);
    bodyLines.push(line);
});

// Floating neon rings around figure
const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff00cc,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
    wireframe: true,
});
for (let i = 0; i < 3; i++) {
    const rGeo = new THREE.TorusGeometry(0.8 + i * 0.3, 0.008, 16, 48);
    const rMesh = new THREE.Mesh(rGeo, ringMat.clone());
    rMesh.material.color.setHSL(0.83 + i * 0.1, 1, 0.5);
    rMesh.position.y = 0.8 + i * 0.2;
    rMesh.rotation.x = Math.PI / 2 + (i * 0.4);
    rMesh.rotation.z = i * 0.5;
    figGroup.add(rMesh);
}

// ===== CORE SPHERE =====
const coreGeo = new THREE.SphereGeometry(0.12, 24, 24);
const coreMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.9,
});
const core = new THREE.Mesh(coreGeo, coreMat);
core.position.y = -0.1;
group.add(core);

// Glow around core
const glowGeo = new THREE.SphereGeometry(0.2, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({
    color: 0xff00cc,
    transparent: true,
    opacity: 0.3,
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
glowMesh.position.y = -0.1;
group.add(glowMesh);

// ===== INNER ICOSAHEDRON =====
const iGeo = new THREE.IcosahedronGeometry(0.7, 0);
const iMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    wireframe: true,
    transparent: true,
    opacity: 0.25,
});
const inet = new THREE.Mesh(iGeo, iMat);
inet.position.y = -0.1;
group.add(inet);

// ===== OUTER ICOSAHEDRON =====
const oGeo = new THREE.IcosahedronGeometry(1.1, 0);
const oMat = new THREE.MeshBasicMaterial({
    color: 0xff00cc,
    wireframe: true,
    transparent: true,
    opacity: 0.12,
});
const outMesh = new THREE.Mesh(oGeo, oMat);
outMesh.position.y = -0.1;
group.add(outMesh);

// ===== TORUS RINGS =====
const rMat = new THREE.MeshBasicMaterial({
    color: 0xff00cc,
    transparent: true,
    side: THREE.DoubleSide,
});

const r1 = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.025, 16, 64), rMat.clone());
r1.material.color.setHex(0xff00cc);
r1.material.opacity = 0.5;
group.add(r1);

const r2 = new THREE.Mesh(new THREE.TorusGeometry(1.9, 0.02, 16, 64), rMat.clone());
r2.material.color.setHex(0x00ffff);
r2.material.opacity = 0.4;
group.add(r2);

const r3 = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.015, 16, 64), rMat.clone());
r3.material.color.setHex(0xffff00);
r3.material.opacity = 0.3;
group.add(r3);

// Thin extra rings
for (let i = 0; i < 6; i++) {
    const r = new THREE.Mesh(
        new THREE.TorusGeometry(1.3 + i * 0.2, 0.005, 8, 48),
        new THREE.MeshBasicMaterial({
            color: i % 2 === 0 ? 0xff00cc : 0x00ffff,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide,
        })
    );
    r.position.y = -0.1;
    r.rotation.x = Math.PI / 2 + (i * 0.3);
    r.rotation.z = i * 0.2;
    group.add(r);
}

// ===== ORBITING DOTS =====
const dotCount = 400;
const dotData = [];
const dotPos = new Float32Array(dotCount * 3);
for (let i = 0; i < dotCount; i++) {
    const r = 1.2 + Math.random() * 2.5;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const speed = 0.5 + Math.random() * 1.5;
    const off = Math.random() * Math.PI * 2;
    dotData.push({ r, theta, phi, speed, off, origR: r });
    const th = theta;
    const ph = phi;
    dotPos[i*3] = Math.sin(ph)*Math.cos(th)*r;
    dotPos[i*3+1] = Math.sin(ph)*Math.sin(th)*r;
    dotPos[i*3+2] = Math.cos(ph)*r;
}
const dotGeo = new THREE.BufferGeometry();
dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
const dotMat = new THREE.PointsMaterial({
    color: 0x8888ff,
    size: 0.04,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true,
});
const dotP = new THREE.Points(dotGeo, dotMat);
group.add(dotP);

// ===== LARGER BACKGROUND STARS =====
const starCount2 = 2000;
const sPos2 = new Float32Array(starCount2 * 3);
const sCol2 = new Float32Array(starCount2 * 3);
const sSiz2 = new Float32Array(starCount2);
const sVel2 = [];
for (let i = 0; i < starCount2; i++) {
    const r = 15 + Math.random() * 40;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    sPos2[i*3] = Math.sin(phi)*Math.cos(theta)*r;
    sPos2[i*3+1] = Math.sin(phi)*Math.sin(theta)*r;
    sPos2[i*3+2] = Math.cos(phi)*r;
    const c = new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.5, 0.4 + Math.random() * 0.3);
    sCol2[i*3] = c.r;
    sCol2[i*3+1] = c.g;
    sCol2[i*3+2] = c.b;
    sSiz2[i] = 0.02 + Math.random() * 0.08;
    sVel2.push({
        x: (Math.random() - 0.5) * 0.002,
        y: (Math.random() - 0.5) * 0.002,
        z: (Math.random() - 0.5) * 0.002,
    });
}
const sg2 = new THREE.BufferGeometry();
sg2.setAttribute('position', new THREE.BufferAttribute(sPos2, 3));
sg2.setAttribute('color', new THREE.BufferAttribute(sCol2, 3));
sg2.setAttribute('size', new THREE.BufferAttribute(sSiz2, 1));
const sm2 = new THREE.PointsMaterial({
    size: 0.05,
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true,
});
const stars2 = new THREE.Points(sg2, sm2);
scene.add(stars2);

// ===== FLOATING TEXT PARTICLES =====
const textGroup = new THREE.Group();
group.add(textGroup);
const textParticles = [];
const glowTexts = [
    { text: 'CYBER', x: -2.5, y: 0.5, z: 0 },
    { text: 'PUNK', x: 2.5, y: -0.2, z: 0 },
    { text: '2077', x: -2.2, y: -1.0, z: 0.5 },
    { text: 'NEON', x: 2.2, y: 0.8, z: -0.5 },
];
glowTexts.forEach(gt => {
    const chars = gt.text.split('');
    chars.forEach((ch, ci) => {
        const count = 30;
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 0.5 + ci * 0.4 - (chars.length * 0.2);
            positions[i*3+1] = (Math.random() - 0.5) * 0.5;
            positions[i*3+2] = (Math.random() - 0.5) * 0.3;
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const m = new THREE.PointsMaterial({
            color: new THREE.Color().setHSL(0.83 + Math.random()*0.2, 1, 0.6),
            size: 0.04,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
        });
        const p = new THREE.Points(g, m);
        p.position.set(gt.x, gt.y, gt.z);
        textGroup.add(p);
        textParticles.push(p);
    });
});

// ===== MOUSE / TOUCH =====
let mx = 0, my = 0;
let tx = 0, ty = 0;
document.addEventListener('mousemove', (e) => {
    mx = (e.clientX / window.innerWidth) * 2 - 1;
    my = -(e.clientY / window.innerHeight) * 2 + 1;
});
let touchStartX = 0, touchStartY = 0, touchActive = false;
document.addEventListener('touchstart', (e) => {
    touchActive = true;
    if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }
}, { passive: true });
document.addEventListener('touchmove', (e) => {
    if (!touchActive || e.touches.length !== 1) return;
    const dx = Math.abs(e.touches[0].clientX - touchStartX);
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    if (dx > dy && dx > 10) {
        mx = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
        my = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    }
}, { passive: true });
document.addEventListener('touchend', () => {
    touchActive = false; mx = 0; my = 0;
}, { passive: true });

// ===== RESIZE =====
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h); composer.setSize(w, h);
});

// ===== ANIMATION =====
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    tx += (mx - tx) * 0.05;
    ty += (my - ty) * 0.05;

    // Figure animation
    figGroup.rotation.y = Math.sin(t * 0.2) * 0.05;
    figGroup.position.x = Math.sin(t * 0.15) * 0.05;
    figGroup.position.y = Math.sin(t * 0.1) * 0.03;

    // Core pulse
    const p = 1 + Math.sin(t * 1.2) * 0.03;
    core.scale.set(p, p, p);
    glowMesh.scale.set(p * 1.5, p * 1.5, p * 1.5);
    coreMat.opacity = 0.7 + Math.sin(t * 1.2) * 0.2;
    glowMat.opacity = 0.2 + Math.sin(t * 1.2) * 0.1;

    // Icosahedrons
    inet.rotation.x = t * 0.02 + ty * 0.2;
    inet.rotation.y = t * 0.03 + tx * 0.3;
    outMesh.rotation.x = -t * 0.015 + ty * 0.1;
    outMesh.rotation.y = -t * 0.025 + tx * 0.2;

    // Torus rings - dramatic rotation
    r1.rotation.x = Math.sin(t * 0.15) * 0.3;
    r1.rotation.y = t * 0.2;
    r1.rotation.z = t * 0.1 + 0.2;

    r2.rotation.x = t * 0.15 + 1.2;
    r2.rotation.y = t * 0.12 + 0.7;
    r2.rotation.z = Math.cos(t * 0.1) * 0.2;

    r3.rotation.x = Math.sin(t * 0.08) * 0.4;
    r3.rotation.y = -t * 0.1;
    r3.rotation.z = t * 0.06;

    // Orbit dots
    const dp = dotP.geometry.attributes.position.array;
    for (let i = 0; i < dotCount; i++) {
        const d = dotData[i];
        const th = d.theta + t * d.speed * 0.06;
        const ph = d.phi + Math.sin(t * d.speed * 0.03 + d.off) * 0.03;
        const rr = d.origR + Math.sin(t * 0.5 + d.off) * 0.1;
        dp[i*3] = Math.sin(ph)*Math.cos(th)*rr;
        dp[i*3+1] = Math.sin(ph)*Math.sin(th)*rr;
        dp[i*3+2] = Math.cos(ph)*rr;
    }
    dotP.geometry.attributes.position.needsUpdate = true;

    // Stars drift
    const sp = stars2.geometry.attributes.position.array;
    for (let i = 0; i < starCount2; i++) {
        sp[i*3] += sVel2[i].x;
        sp[i*3+1] += sVel2[i].y;
        sp[i*3+2] += sVel2[i].z;
        const r = Math.sqrt(sp[i*3]**2 + sp[i*3+1]**2 + sp[i*3+2]**2);
        if (r > 60) {
            const nr = 15 + Math.random()*8;
            const t2 = Math.random()*Math.PI*2;
            const p2 = Math.acos(2*Math.random()-1);
            sp[i*3] = Math.sin(p2)*Math.cos(t2)*nr;
            sp[i*3+1] = Math.sin(p2)*Math.sin(t2)*nr;
            sp[i*3+2] = Math.cos(p2)*nr;
        }
    }
    stars2.geometry.attributes.position.needsUpdate = true;

    // Text particles float
    textGroup.rotation.y = Math.sin(t * 0.05) * 0.1;
    textParticles.forEach((p, i) => {
        p.rotation.x = Math.sin(t * 0.5 + i) * 0.02;
        p.rotation.y = t * 0.1 + i * 0.5;
    });

    // Camera
    camera.position.x = Math.sin(t * 0.015) * 0.8 + tx * 0.8;
    camera.position.y = 0.8 + Math.sin(t * 0.02) * 0.2 + ty * 0.5;
    camera.lookAt(0, 0.2, 0);

    // Bloom pulse
    bloom.strength = 0.5 + Math.sin(t * 0.3) * 0.15;

    composer.render();
}
animate();
</script>

</html>
